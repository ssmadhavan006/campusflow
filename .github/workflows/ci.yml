name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campusflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campusflow_test?schema=public

      - run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campusflow_test?schema=public
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_ci
          JWT_VERIFICATION_SECRET: test_verify_secret_ci
          JWT_RESET_SECRET: test_reset_secret_ci
          QR_SECRET: test_qr_secret_ci
          GOOGLE_CLIENT_ID: 845315933534-lcbj5lqb8ockg20d9v3en75665lja6bl.apps.googleusercontent.com
          FRONTEND_URL: http://localhost:5173
          BACKEND_URL: http://localhost:3000
          UPLOAD_DIR: /tmp/uploads

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build
